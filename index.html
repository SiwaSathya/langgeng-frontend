<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cashier System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-600">Administration</h1>
            <p class="text-gray-400 text-sm">Please login to your account</p>
        </div>
        <form action="dashboard.html" onsubmit="return validateLogin(event)">
            <div class="mb-4">
                <label class="block text-gray-600 text-sm font-semibold mb-2">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border border-blue-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="admin">
            </div>
            <div class="mb-6">
                <label class="block text-gray-600 text-sm font-semibold mb-2">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-blue-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 rounded-lg transition duration-300">
                Login
            </button>
        </form>
    </div>

    <script>
        function validateLogin(e) {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === "admin" && pass === "admin123") {
                return true;
            } else {
                e.preventDefault();
                alert("Username atau Password Salah! (admin/admin123)");
                return false;
            }
        }
    </script>
</body>
</html>
